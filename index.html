// Score-Chart 0–100, flach, mit X-(Datum) & Y-(Punkte) Achse
function bigChart(dates,vals,label,col,onclick){
  const w=700,h=164,pl=32,prr=12,pt=10,pb=30,id='hg_'+label.replace(/\W/g,'');
  const pw=w-pl-prr,ph=h-pt-pb;
  const x=i=>pl+i*(pw/Math.max(1,dates.length-1)), y=v=>pt+ph-(v/100)*ph;
  const pr=vals.map((v,i)=>[i,v]).filter(a=>a[1]!=null);
  const line=pr.map(([i,v])=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area=pr.length?`${x(pr[0][0]).toFixed(1)},${(pt+ph).toFixed(1)} ${line} ${x(pr[pr.length-1][0]).toFixed(1)},${(pt+ph).toFixed(1)}`:'';
  const last=pr.length?pr[pr.length-1][1]:0,first=pr.length?pr[0][1]:0,tr=Math.round(last-first);
  const n=dates.length,cnt=Math.min(4,n),ticks=[];for(let t=0;t<cnt;t++)ticks.push(cnt===1?0:Math.round(t*(n-1)/(cnt-1)));
  return `<div class="panel chart-card" ${onclick?`onclick="${onclick}" style="cursor:pointer"`:''}>
    <div class="between"><span class="lab">${label}</span><span class="sm mut">Ø ${pr.length?Math.round(pr.reduce((a,b)=>a+b[1],0)/pr.length):0} · <b style="color:${tr>=0?'var(--green)':'var(--red)'}">${tr>=0?'▲':'▼'}${Math.abs(tr)}</b>${onclick?' <span class="mut" style="font-size:17px">›</span>':''}</span></div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;margin-top:5px">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".2"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      ${[0,50,100].map(v=>`<line x1="${pl}" y1="${y(v).toFixed(1)}" x2="${w-prr}" y2="${y(v).toFixed(1)}" stroke="var(--line)"${v===50?' stroke-dasharray="4"':''}/><text x="${pl-6}" y="${(y(v)+3.5).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--mut2)">${v}</text>`).join('')}
      ${area?`<polygon points="${area}" fill="url(#${id})"/>`:''}
      <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
      ${pr.map(([i,v])=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="${col}"/>`).join('')}
      ${ticks.map(ti=>`<text x="${x(ti).toFixed(1)}" y="${h-11}" text-anchor="middle" font-size="10" fill="var(--mut2)">${_dm(dates[ti])}</text>`).join('')}
      <text x="${((pl+w-prr)/2).toFixed(0)}" y="${h-1}" text-anchor="middle" font-size="9.5" fill="var(--mut2)">Datum</text>
      <text x="10" y="${(pt+ph/2).toFixed(0)}" text-anchor="middle" font-size="9.5" fill="var(--mut2)" transform="rotate(-90 10 ${(pt+ph/2).toFixed(0)})">Punkte</text>
    </svg></div>`;
}
// Auto-skalierter Roh-Trend mit Y-Min/Max & Start/End-Datum
function miniTrend(dates,vals,col,label,unit,inv){
  const pr=vals.filter(v=>v!=null);
  if(!pr.length)return `<div class="between" style="margin-top:15px"><span class="lab">${label}</span><span class="xs mut">keine Daten</span></div>`;
  const lo=Math.min(...pr),hi=Math.max(...pr),rng=(hi-lo)||1,w=700,H=72,pl=34,pb=15,pt=6;
  const pw=w-pl-8,ph=H-pt-pb;
  const x=i=>pl+i*(pw/Math.max(1,dates.length-1)), y=v=>pt+ph-((v-lo)/rng)*ph;
  let segs=[],cur=[];vals.forEach((v,i)=>{if(v==null){if(cur.length){segs.push(cur);cur=[];}}else cur.push(`${x(i).toFixed(1)},${y(v).toFixed(1)}`);});if(cur.length)segs.push(cur);
  const last=pr[pr.length-1],first=pr[0],tr=Math.round((last-first)*10)/10,good=inv?tr<=0:tr>=0;
  const firstIdx=vals.findIndex(v=>v!=null),lastIdx=vals.length-1-[...vals].reverse().findIndex(v=>v!=null);
  return `<div class="between" style="margin-top:15px"><span class="lab">${label}</span><span class="sm mut">${Math.round(last*10)/10}${unit||''} <b class="serif-it" style="color:${good?'var(--green)':'var(--red)'};font-size:15px;margin-left:6px">${tr>=0?'▲':'▼'} ${Math.abs(tr)}</b></span></div>
   <svg viewBox="0 0 ${w} ${H}" style="width:100%;height:auto;margin-top:3px">
     <text x="${pl-5}" y="${(y(hi)+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--mut2)">${Math.round(hi*10)/10}</text>
     <text x="${pl-5}" y="${(y(lo)+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--mut2)">${Math.round(lo*10)/10}</text>
     ${segs.map(s=>`<polyline points="${s.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`).join('')}
     ${vals.map((v,i)=>v==null?'':`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.2" fill="${col}"/>`).join('')}
     <text x="${pl}" y="${H-3}" text-anchor="start" font-size="9.5" fill="var(--mut2)">${_dm(dates[firstIdx])}</text>
     <text x="${w-8}" y="${H-3}" text-anchor="end" font-size="9.5" fill="var(--mut2)">${_dm(dates[lastIdx])}</text>
   </svg>`;
}
// Breadcrumb-Drilldown: [[Label, Ziel|undefined], …] — letztes = aktuell
function histCrumb(path){return `<div class="crumb">${path.map((p,i)=>`${i?'<span class="c-sep">›</span>':''}<span class="${p[1]!==undefined?'c-link':'c-cur'}"${p[1]!==undefined?` onclick="histGo(${p[1]==null?'null':`'${p[1]}'`})"`:''}>${p[0]}</span>`).join('')}</div>`;}
function vHistory(){
  const dates=Object.keys(S.days).filter(d=>S.days[d].scoreSaved!=null).sort();
  if(!dates.length)return backSet()+vh("Trend","Verlauf")+`<div class="panel center mut serif-it" style="font-size:20px;padding:40px">Noch keine getrackten Tage.<br><span class="sm" style="font-style:normal">Log etwas im Dashboard — Tage erscheinen automatisch.</span></div>`;
  // ---- Kategorie-Detail (Bausteine + Tagesvergleich) ----
  if(HIST_CATS[histNav]){
    const cat=HIST_CATS[histNav];
    let html=histCrumb([["Verlauf",null],["Atlas Score","day"],[cat.name]])+vh("Bausteine",cat.name);
    html+=bigChart(dates,dates.map(d=>subScores(d)[histNav]),cat.name+"-Score",cat.col);
    html+=sh("01","Einzelwerte")+`<div class="panel">`;
    cat.comps.forEach(c=>{html+=miniTrend(dates,dates.map(d=>c.fn(d)),cat.col,c.l,c.u,c.inv);});
    html+=`</div>`;
    html+=sh("02","Tagesvergleich")+`<div class="panel" style="overflow-x:auto"><table class="tbl"><tr><th>Datum</th>${cat.comps.map(c=>`<th>${c.l.split(' ')[0]}</th>`).join('')}</tr>`;
    dates.slice(-14).reverse().forEach(d=>{html+=`<tr><td>${d.slice(5)}</td>${cat.comps.map(c=>{const v=c.fn(d);return `<td>${v==null?'–':Math.round(v*10)/10}</td>`;}).join('')}</tr>`;});
    html+=`</table></div>`;
    return html;
  }
  // ---- Atlas Score Drilldown: Kategorie-Trends ----
  if(histNav==='day'){
    let html=histCrumb([["Verlauf",null],["Atlas Score"]])+vh("Zusammensetzung","Atlas Score");
    html+=bigChart(dates,dates.map(d=>S.days[d].scoreSaved),"Atlas Score",HCOL.G);
    html+=sh("01","Kategorie-Trends — tippen für Bausteine");
    [['sleep'],['nut'],['train'],['rec']].forEach(([k])=>{const c=HIST_CATS[k];html+=bigChart(dates,dates.map(d=>subScores(d)[k]),c.name,c.col,`histGo('${k}')`);});
    return html;
  }
  // ---- Huberman Drilldown ----
  if(histNav==='huberman'){
    let html=histCrumb([["Verlauf",null],["Huberman-Score"]])+vh("Protokoll","Huberman-Score");
    html+=bigChart(dates,dates.map(d=>subScores(d).huberman),"Huberman-Score",HCOL.P);
    html+=sh("01","Bausteine")+`<div class="panel">`;
    html+=miniTrend(dates,dates.map(d=>num(day(d).cardioMin)||null),HCOL.P,'Cardio (Zone 2)',' min');
    html+=miniTrend(dates,dates.map(d=>{const p=day(d).protocol||{};const n=Object.keys(p).filter(k=>p[k]).length;return n||null;}),HCOL.P,'Protokoll-Haken','');
    html+=`</div>`;
    return html;
  }
  // ---- Haupt: Atlas Score + Huberman + Tagesliste ----
  let html=backSet()+vh("Trend","Verlauf");
  html+=bigChart(dates,dates.map(d=>S.days[d].scoreSaved),"Atlas Score",HCOL.G,"histGo('day')");
  html+=bigChart(dates,dates.map(d=>subScores(d).huberman),"Huberman-Score",HCOL.P,"histGo('huberman')");
  html+=`<div class="xs mut" style="margin:2px 4px 0">Tippe einen Trend an für Teil-Scores und deren Bausteine.</div>`;
  html+=sh("01","Gespeicherte Tage — tippen zum Öffnen")+`<div class="panel" style="overflow-x:auto"><table class="tbl"><tr><th>Datum</th><th>Score</th><th>Schlaf</th><th>Nutr</th><th>Train</th><th>Recov</th></tr>`;
  dates.slice().reverse().forEach(d=>{const s=subScores(d);html+=`<tr style="cursor:pointer" onclick="openHistDay('${d}')"><td>${d.slice(5)}</td><td><b class="serif-it" style="font-size:17px;color:${scoreColor(S.days[d].scoreSaved)}">${S.days[d].scoreSaved}</b></td><td>${s.sleep}</td><td>${s.nut}</td><td>${s.train}</td><td>${s.rec}</td></tr>`;});
  html+=`</table></div>`;
  return html;
}

/* ---- COACH (interaktiver Chat mit Zugriff auf alle Daten) ---- */
function escapeHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function coachBase(){const u=(whoopCfg().dataUrl||"").trim();if(!u)return"";return u.replace(/\/data\/?$/,"").replace(/\/$/,"")}
function coachConfigured(){return !!coachBase()}
function coachSnapshot(){
  const g=goals(),s=subScores(curDate),dd=day(),ms=mealSum(),mi=microIntake(curDate),z=performanceZones();
  const lowMicros=MICROS.filter(m=>num(mi[m.k])>0&&num(mi[m.k])<m.dri*0.6).map(m=>m.n);
  return {
    datum:curDate,
    profil:S.profile,
    ziele:{kcal:g.kcal,protein:g.protein,carbs:g.carbs,fett:g.fat,bmr:g.bmr,tdee:g.tdee},
    tagesscore:dayScore(curDate),
    pace_of_aging:paceOfAging().pace,
    teilwerte:{schlaf:s.sleep,ernaehrung:s.nut,training:s.train,recovery:s.rec,huberman:s.huberman,spm:s.spm,haare:s.hair},
    whoop:dd.whoop||null,
    schlaf:dd.sleep,recovery:dd.recovery,
    ernaehrung_heute:{kcal:Math.round(ms.kcal),protein:Math.round(ms.p),carbs:Math.round(ms.c),fett:Math.round(ms.f)},
    mikro_luecken:lowMicros,
    stimulanzien:dd.stim,
    tagesform:{peak_stunde:z.peak,gym_fenster:z.train,arbeitsfenster:z.work},
    supplements:S.supplements.map(x=>x.name+" "+(x.dose||"")),
    peptide:S.peptides.map(x=>x.name+" "+(x.dose||"")),
    medikamente:S.meds.map(x=>x.name+" "+(x.dose||"")),
    hair:S.hair.map(x=>x.name),
    wochenvolumen_saetze:weekVolume(),
    huberman_protokoll_heute:Object.keys((dd.protocol||{})).filter(k=>dd.protocol[k]),
    zone2_cardio_woche_min:cardioWeek(),
    blutwerte:S.bloods.slice(-25).map(b=>b.name+": "+b.val+(b.unit||"")),
    methylierung:S.methylation||{}
  };
}
function coachTabStat(k){
  if(k==='med'){const a=tabStatus('med'),b=tabStatus('hair');if(a==='green'&&b==='green')return'green';if(a==='grey'&&b==='grey')return'grey';return'amber';}
  return tabStatus(k);
}
function coachCircle(k,l,ic){const st=k==='chat'?null:coachTabStat(k);return `<div class="cnav ${coachTab===k?'active':''}" onclick="setCoachTab('${k}')"><div class="cnav-c">${ic}${st?`<span class="cnav-dot td-${st}"></span>`:''}</div><span>${l}</span></div>`;}
// volle Kreis-Leiste (auf Tracker-Seiten): Coach zurück + Peptide + Meds&Haare

  html+=`</div>
    <textarea id="coach_in" placeholder="Frag deinen Coach…" style="min-height:58px;margin-top:12px"></textarea>
    <div class="row" style="gap:7px;margin-top:11px;flex-wrap:wrap">${["Genug Protein heute?","Wie ist meine Recovery?","Was soll ich heute trainieren?","Was fehlt mir an Nährstoffen?"].map(p=>`<button class="chip flex0" onclick="askCoach(this.textContent)">${p}</button>`).join("")}</div>
    <div class="row" style="margin-top:11px"><button onclick="sendCoach()">Senden →</button><button class="sec flex0" onclick="clearCoach()">Leeren</button></div>`;
  if(!coachConfigured())html+=`<div class="xs mut" style="margin-top:10px">Coach braucht dein Backend: trag im <b>Profil</b> die WHOOP-Daten-URL ein und setze im Cloudflare Worker einen <b>ANTHROPIC_API_KEY</b>.</div>`;
  html+=`</div>`;
  html+=sh("02","Empfehlungen");
  html+=recoReasoning();
  html+=suggestionsHTML(4);
  html+=protocolHTML();
  html+=sh("03","Schnell-Hinweise");
  coachTips().forEach(([t,d])=>html+=`<div class="list-item"><div class="between"><b class="serif-it" style="font-size:19px">${t}</b></div><div class="sm mut" style="margin-top:6px">${d}</div></div>`);
  return html;

function recoReasoning(){
  const mi=microIntake(curDate);
  const gaps=MICROS.filter(m=>num(mi[m.k])>0&&num(mi[m.k])<m.dri*0.6).map(m=>m.n);
  const flagged=S.bloods.filter(b=>{const r=matchRef(b.name),st=r?refStatus(r,num(b.val)):null;return st&&st!=="ok"}).map(b=>b.name);
  const methyl=Object.keys(S.methylation||{}).filter(k=>S.methylation[k]&&S.methylation[k]!=="norm").map(k=>{const m=METHYL.find(x=>x.k===k);return (m?m.n:k)+" "+S.methylation[k]});
  const parts=[];
  if(gaps.length)parts.push(`Deine <b>Ernährung</b> liegt über die letzten Tage zu niedrig bei: <b>${gaps.join(", ")}</b>.`);
  if(flagged.length)parts.push(`Deine <b>Blutwerte</b> sind auffällig bei: <b>${flagged.join(", ")}</b>.`);
  if(methyl.length)parts.push(`Dein <b>Methylierungstest</b>: <b>${methyl.join(", ")}</b> → bevorzuge methylierte Formen (z.B. Methylfolat, Methyl-B12).`);
  if(!parts.length)return `<div class="panel mut sm">Lade Blutwerte & Methylierung (Labor-Seite) hoch und logge Essen — dann zeige ich hier die komplette Beleg-Kette für jede Empfehlung.</div>`;
  return `<div class="panel coach-panel"><span class="tag">Belege aus deinen Daten</span><div class="sm" style="margin-top:10px;line-height:1.6">${parts.join(" ")} Daraus ergeben sich die folgenden priorisierten Ergänzungen — mit Dosis & Timing.</div></div>`;
}
window.askCoach=t=>{const inp=$("#coach_in");if(inp)inp.value=t;sendCoach();};
window.clearCoach=()=>{S.coachChat=[];save();render()};
window.sendCoach=async()=>{
  const inp=$("#coach_in");const q=inp?(inp.value||"").trim():"";if(!q)return;
  S.coachChat=S.coachChat||[];S.coachChat.push({role:"user",content:q});S.coachChat.push({role:"assistant",content:"…"});save();render();
  const base=coachBase();
  const setLast=t=>{S.coachChat[S.coachChat.length-1].content=t;save();render()};
  if(!base){setLast("Noch kein Backend verbunden. Trag die WHOOP-Daten-URL in Health Metrics → WHOOP ein — der Coach läuft über denselben Worker.");return;}
  try{
    const c=whoopCfg();
    const r=await fetch(base+"/coach",{method:"POST",headers:Object.assign({"Content-Type":"application/json"},c.token?{"Authorization":"Bearer "+c.token}:{}),body:JSON.stringify({messages:S.coachChat.filter(m=>m.content!=="…"),snapshot:coachSnapshot()})});
    const d=await r.json().catch(()=>({error:"Antwort unlesbar"}));
    if(d.reply)setLast(d.reply);
    else if(d.error==="coach_not_configured")setLast("Im Worker fehlt der ANTHROPIC_API_KEY. Setz ihn als Secret, dann antworte ich.");
    else setLast("Fehler: "+(d.error||"keine Antwort")+(d.detail?" — "+String(d.detail).slice(0,160):""));
  }catch(e){setLast("Coach nicht erreichbar (Worker/CORS prüfen).");}
};

/* ============ WHOOP INTEGRATION ============ */
const WHOOP_AUTH="https://api.prod.whoop.com/oauth/oauth2/auth";
const WHOOP_SCOPES="read:recovery read:sleep read:workout read:cycles read:profile offline";
const DEFAULT_BACKEND="https://maxcoach.7zfp8cmwhg.workers.dev"; // fest hinterlegt → immer verbunden
const DEFAULT_CLIENT_ID="470157a7-82b1-43bc-87eb-c3bc7d9b4b15";
const DEFAULT_REDIRECT="https://7zfp8cmwhg-art.github.io/whoop-app/redirect.html";
function whoopCfg(){S.whoopCfg=S.whoopCfg||{clientId:"",redirectUri:"",dataUrl:"",token:""};
  if(!S.whoopCfg.dataUrl)S.whoopCfg.dataUrl=DEFAULT_BACKEND+"/data";
  if(!S.whoopCfg.clientId)S.whoopCfg.clientId=DEFAULT_CLIENT_ID;
  if(!S.whoopCfg.redirectUri)S.whoopCfg.redirectUri=DEFAULT_REDIRECT;
  return S.whoopCfg}
function defRedirect(){return location.origin+location.pathname.replace(/[^/]*$/,'')+"redirect.html"}
function whoopAuthURL(){const c=whoopCfg();const st=Math.random().toString(36).slice(2,12);try{localStorage.setItem("whoop_state",st)}catch(e){}
  const ri=c.redirectUri||defRedirect();
  return WHOOP_AUTH+"?response_type=code&client_id="+encodeURIComponent(c.clientId)+"&redirect_uri="+encodeURIComponent(ri)+"&scope="+encodeURIComponent(WHOOP_SCOPES)+"&state="+st;}
window.connectWhoop=()=>{const c=whoopCfg();if(!c.clientId){flash("Client ID fehlt");return}location.href=whoopAuthURL();};
window.saveWhoopCfg=()=>{const c=whoopCfg();c.clientId=($("#wh_cid").value||"").trim();c.redirectUri=($("#wh_ri").value||"").trim();c.dataUrl=($("#wh_url").value||"").trim();c.token=($("#wh_tok")&&$("#wh_tok").value||"").trim();save();flash("WHOOP-Konfig gespeichert");render();};
window.syncWhoop=async()=>{const c=whoopCfg();if(!c.dataUrl){flash("Daten-URL fehlt");return}flash("Synchronisiere…");try{const r=await fetch(c.dataUrl,{headers:c.token?{"Authorization":"Bearer "+c.token}:{}});const d=await r.json();const n=applyWhoop(d);save();flash(n+" WHOOP-Einträge übernommen");render();}catch(e){flash("Sync fehlgeschlagen (Server/CORS prüfen)");}};
window.importWhoop=()=>{try{const d=JSON.parse($("#wh_json").value);const n=applyWhoop(d);if(!n){flash("Keine bekannten Felder gefunden");return}save();flash(n+" Einträge übernommen");render();}catch(e){flash("Ungültiges JSON");}};
function whoopDate(o){return String(o.start||o.created_at||o.updated_at||o.date||todayStr()).slice(0,10)}
function applyWhoop(d){if(!d)return 0;let n=0;const arr=x=>Array.isArray(x)?x:(x?[x]:[]);
  arr(d.recovery||d.recoveries||(d.type==="recovery"?d.records:null)).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};
    if(s.recovery_score!=null)dd.whoop.recoveryScore=Math.round(s.recovery_score);
    if(s.hrv_rmssd_milli!=null)dd.whoop.hrvMs=Math.round(s.hrv_rmssd_milli*10)/10;
    if(s.resting_heart_rate!=null)dd.whoop.rhr=Math.round(s.resting_heart_rate);
    if(s.spo2_percentage!=null)dd.whoop.spo2=Math.round(s.spo2_percentage*10)/10;
    if(s.skin_temp_celsius!=null)dd.whoop.skinTemp=Math.round(s.skin_temp_celsius*10)/10;
    if(dd.whoop.recoveryScore!=null)dd.recovery.hrv=clamp(Math.round(dd.whoop.recoveryScore/10),0,10);n++;});
  arr(d.sleep||d.sleeps).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};
    const ss=s.stage_summary||{};
    let ms=null;if(ss.total_in_bed_time_milli!=null)ms=ss.total_in_bed_time_milli-(ss.total_awake_time_milli||0);
    else if(s.total_sleep_milli!=null)ms=s.total_sleep_milli;else if(o.total_sleep_milli!=null)ms=o.total_sleep_milli;
    if(ms!=null){dd.whoop.sleepHours=Math.round(ms/3600000*10)/10;dd.sleep.hours=dd.whoop.sleepHours;}
    const perf=s.sleep_performance_percentage!=null?s.sleep_performance_percentage:o.sleep_performance_percentage;
    if(perf!=null){dd.whoop.sleepPerf=Math.round(perf);dd.sleep.quality=clamp(Math.round(perf/10),0,10);}
    if(s.sleep_efficiency_percentage!=null)dd.whoop.sleepEff=Math.round(s.sleep_efficiency_percentage);
    if(s.sleep_consistency_percentage!=null)dd.whoop.sleepCons=Math.round(s.sleep_consistency_percentage);
    if(s.respiratory_rate!=null)dd.whoop.respRate=Math.round(s.respiratory_rate*10)/10;
    const mh=v=>v!=null?Math.round(v/3600000*10)/10:null;
    if(ss.total_light_sleep_time_milli!=null)dd.whoop.slLight=mh(ss.total_light_sleep_time_milli);
    if(ss.total_slow_wave_sleep_time_milli!=null)dd.whoop.slDeep=mh(ss.total_slow_wave_sleep_time_milli);
    if(ss.total_rem_sleep_time_milli!=null)dd.whoop.slRem=mh(ss.total_rem_sleep_time_milli);
    if(ss.total_awake_time_milli!=null)dd.whoop.slAwake=mh(ss.total_awake_time_milli);
    if(ss.disturbance_count!=null)dd.whoop.slDist=ss.disturbance_count;
    if(s.sleep_needed&&s.sleep_needed.baseline_milli!=null){const need=s.sleep_needed.baseline_milli+(s.sleep_needed.need_from_sleep_debt_milli||0)+(s.sleep_needed.need_from_recent_strain_milli||0)+(s.sleep_needed.need_from_recent_nap_milli||0);dd.whoop.sleepNeed=mh(need);}
    if(o.end)dd.whoop.wakeHour=localHour(o.end,o.tz);
    if(o.start)dd.whoop.bedHour=localHour(o.start,o.tz);
    n++;});
  arr(d.workout||d.workouts).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};if(s.strain!=null)dd.whoop.strain=Math.round(s.strain*10)/10;n++;});
  arr(d.cycle||d.cycles).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};if(s.strain!=null)dd.whoop.dayStrain=Math.round(s.strain*10)/10;if(s.kilojoule!=null)dd.whoop.kcalBurn=Math.round(s.kilojoule/4.184);n++;});
  return n;}

window.obGo=n=>{const t=document.getElementById('obTrack');if(!t)return;const N=t.children.length;obIndex=Math.max(0,Math.min(N-1,n));obApply();};
function obApply(){const t=document.getElementById('obTrack'),dz=document.getElementById('obDots'),br=document.getElementById('obBar');if(!t)return;const N=t.children.length;t.style.transform='translateX('+(-obIndex*100)+'%)';if(dz)[...dz.children].forEach((d,k)=>d.classList.toggle('on',k===obIndex));if(br){if(obIndex===0)br.style.display='none';else{br.style.display='flex';br.innerHTML=obIndex===N-1?'<button class="ob-btn" onclick="obFinish()">Jetzt nutzen</button>':'<button class="ob-btn" onclick="obGo('+(obIndex+1)+')">Weiter</button>';}}const sl=t.children[obIndex];if(sl)sl.scrollTop=0;}
window.obFinish=()=>{S.onboarded=true;save();const r=document.getElementById('obRoot');if(r)r.remove();render();};
function initOnboarding(){const t=document.getElementById('obTrack'),dz=document.getElementById('obDots');if(!t||!dz)return;const N=t.children.length;dz.innerHTML='';for(let k=0;k<N;k++){const d=document.createElement('div');d.className='ob-dot'+(k===0?' on':'');dz.appendChild(d);}obIndex=0;obApply();
  let sx=0,drag=false;const mv=e=>{if(!drag)return;const dx=e.clientX-sx;t.style.transform='translateX(calc('+(-obIndex*100)+'% + '+dx+'px))';};const up=e=>{if(!drag)return;drag=false;t.style.transition='';const dx=e.clientX-sx,M=t.children.length;if(dx<-50&&obIndex<M-1)obGo(obIndex+1);else if(dx>50&&obIndex>0)obGo(obIndex-1);else obApply();window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
  t.onpointerdown=e=>{if(obIndex===0)return;drag=true;sx=e.clientX;t.style.transition='none';window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);};}
function showOnboarding(){if(document.getElementById('obRoot')||S.onboarded)return;const root=document.createElement('div');root.id='obRoot';root.innerHTML='<div class="ob-in"><div class="ob-dots" id="obDots"></div><div class="ob-track" id="obTrack">'+obSlides()+'</div><div class="ob-bar" id="obBar"></div></div>';document.body.appendChild(root);initOnboarding();}
