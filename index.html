  const types=["Frühstück","Mittag","Abendessen","Snack"];
  html+=`<div class="panel">
    <div class="row" style="gap:8px;margin-bottom:14px">${types.map(t=>`<button class="chip flex0 ${mealType===t?'on':''}" onclick="setMealType('${t}')">${t}</button>`).join("")}</div>
    ${_foodBusy?`<div class="panel coach-panel" style="margin-bottom:12px"><b class="serif-it" style="font-size:18px">🔍 Analysiere Mahlzeit…</b><div class="xs mut" style="margin-top:6px">Die KI erkennt Lebensmittel, schätzt Gramm & Nährwerte.</div></div>`:''}
    ${_photo&&!_foodBusy?`<div style="margin-bottom:12px;position:relative;display:inline-block"><img src="${_photo}" class="foodthumb"><button class="danger sm" style="position:absolute;top:-6px;right:-6px" onclick="clearPhoto()">×</button></div>`:''}
    <button style="width:100%" onclick="document.getElementById('camIn').click()">📷 Mahlzeit fotografieren → Auto-Analyse</button>
    <input id="camIn" type="file" accept="image/*" capture="environment" style="display:none" onchange="captureFood(this)">
    <div class="xs mut" style="margin:9px 0 14px">Foto der ganzen Mahlzeit — Lebensmittel, Gramm, kcal, Makros & Mikros werden automatisch erkannt und eingetragen.</div>
    <hr>
    <label>…oder manuell: Lebensmittel</label>
    <input id="f_name" list="foodlist" placeholder="z.B. Hähnchenbrust" autocomplete="off">
    <datalist id="foodlist">${FOODNAMES.map(n=>`<option value="${n}">`).join('')}</datalist>
    <div class="row" style="margin-top:9px"><div style="flex:1"><label>Menge (g)</label><input id="f_g" type="number" value="100" inputmode="decimal"></div></div>

    <details style="margin-top:10px"><summary class="lab" style="cursor:pointer">Manuell eingeben (nicht in DB)</summary>
      <input id="m_name" placeholder="Name" style="margin-top:10px">
      <div class="row" style="margin-top:9px">${field("kcal","m_k")}${field("P","m_p")}${field("C","m_c")}${field("F","m_f")}</div>
      <button class="sec" style="margin-top:10px" onclick="addMeal()">+ Manuell</button></details>
  </div>`;
  if(dd.meals.length){html+=sh("02","Geloggt");

      const tot=num(m.p)+num(m.c)+num(m.f)||1;
      html+=`<div class="list-item"><div class="between"><div style="display:flex;gap:11px;align-items:center">${m.photo?`<img src="${m.photo}" class="foodthumb sm2">`:''}<div><b class="serif-it" style="font-size:19px">${m.name||"Mahlzeit"}</b>${m.grams?` <span class="xs mut">${m.grams}g</span>`:''} ${m.type?`<span class="pill" style="margin-left:6px">${m.type}</span>`:""}</div></div><div class="right"><b class="serif-it" style="font-size:22px">${Math.round(m.kcal)}</b> <span class="lab">kcal</span></div></div>
      <div class="bar" style="margin-top:10px;display:flex;gap:2px;background:transparent">

    html+=`<div class="microrow"><div class="flex0">${miniRing(pct,52,col)}</div><div style="flex:1;min-width:0"><div class="between"><span class="lab">${m.n}</span><span class="sm mut">${a} / ${m.dri} ${m.u}</span></div><div class="xs mut" style="margin-top:3px">${m.role}</div></div></div>`;});
  html+=`</div>`;
  return html;
}
let _photo=null,_foodBusy=false;
window.setMealType=t=>{mealType=t;render()};
function downscaleImage(dataUrl,maxDim,q,cb){const img=new Image();img.onload=()=>{let w=img.width,hh=img.height;const sc=Math.min(1,maxDim/Math.max(w,hh));const cw=Math.max(1,Math.round(w*sc)),ch=Math.max(1,Math.round(hh*sc));const cv=document.createElement("canvas");cv.width=cw;cv.height=ch;cv.getContext("2d").drawImage(img,0,0,cw,ch);try{cb(cv.toDataURL("image/jpeg",q));}catch(e){cb(dataUrl);}};img.onerror=()=>cb(dataUrl);img.src=dataUrl;}
window.captureFood=inp=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{downscaleImage(ev.target.result,768,0.6,small=>{_photo=small;analyzeFood(small);});};r.readAsDataURL(f);};
async function analyzeFood(dataUrl){
  const base=coachBase();
  if(!base){flash("Foto-Analyse braucht das Backend (Daten-URL im Profil)");render();return;}
  _foodBusy=true;render();
  try{
    const c=whoopCfg();
    const r=await fetch(base+"/food",{method:"POST",headers:Object.assign({"Content-Type":"application/json"},c.token?{"Authorization":"Bearer "+c.token}:{}),body:JSON.stringify({image:dataUrl})});
    if(!r.ok){const t=await r.text().catch(()=>"");flash("Fehler "+r.status+": "+(t||"").slice(0,90));_foodBusy=false;render();return;}
    const d=await r.json().catch(()=>({error:"Antwort unlesbar"}));
    if(d.items&&d.items.length){
      d.items.forEach((it,idx)=>{const mi={};if(it.mi)for(const k in it.mi)mi[k]=num(it.mi[k]);
        day().meals.push({id:uid(),name:it.name||"Mahlzeit",type:mealType,grams:Math.round(num(it.grams))||null,kcal:Math.round(num(it.kcal)),p:Math.round(num(it.p)),c:Math.round(num(it.c)),f:Math.round(num(it.f)),mi,photo:idx===0?dataUrl:null});});
      _photo=null;save();flash(d.items.length+" Lebensmittel erkannt ✓");
    } else { flash("Nichts erkannt"+(d.error?": "+d.error+(d.detail?" — "+String(d.detail).slice(0,80):""):"")); }
  }catch(e){flash("Netzwerk: "+((e&&e.message)||e));}
  _foodBusy=false;render();
}

function miniRing(v,size,color){size=size||54;v=clamp(v,0,100);const r=size/2-5,cc=2*Math.PI*r,off=cc*(1-v/100),c=size/2;return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block"><circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="5"/><circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color||'var(--green)'}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${cc}" stroke-dashoffset="${off}" transform="rotate(-90 ${c} ${c})"/><text x="${c}" y="${c+4}" text-anchor="middle" font-family="Space Mono,monospace" font-size="${Math.round(size*0.3)}" fill="var(--txt)">${Math.round(v)}</text></svg>`;}
/* Getränke-Katalog (reiner Alkohol in g = ml × Vol% × 0,789) */
const DRINKS=[
 {k:'bier033',n:'Bier 0,33 l',ml:330,abv:5},
 {k:'bier05',n:'Bier 0,5 l',ml:500,abv:5},
 {k:'radler',n:'Radler 0,5 l',ml:500,abv:2.5},
 {k:'wein02',n:'Wein 0,2 l',ml:200,abv:12},
 {k:'wein01',n:'Wein 0,1 l',ml:100,abv:12},
 {k:'sekt',n:'Sekt/Prosecco 0,1 l',ml:100,abv:11},
 {k:'aperol',n:'Aperol Spritz',ml:150,abv:8},
 {k:'vodkalemon',n:'Vodka Lemon',ml:40,abv:40},
 {k:'havanacola',n:'Havana Cola',ml:40,abv:40},
 {k:'gintonic',n:'Gin Tonic',ml:40,abv:40},
 {k:'cocktail',n:'Cocktail (stark)',ml:60,abv:35},
 {k:'shot',n:'Shot 2 cl',ml:20,abv:40},
 {k:'spirituose',n:'Spirituose pur 4 cl',ml:40,abv:40},
];
DRINKS.forEach(d=>d.g=Math.round(d.ml*d.abv/100*0.789*10)/10);
const DRINKS_MAP={};DRINKS.forEach(d=>DRINKS_MAP[d.k]=d);
// Alt-Format → neues Format angleichen
function normStim(dd){const s=dd.stim=dd.stim||{};if(s.caffeine==null)s.caffeine=0;if(!s.drinks||typeof s.drinks!=='object')s.drinks={};if(!s.vape||typeof s.vape!=='object')s.vape={ml:0,mgml:20,puffs:0};if(s.vape.mgml==null)s.vape.mgml=20;if(s.cigs==null)s.cigs=0;if(typeof s.snus!=='object'||s.snus==null)s.snus={count:num(s.snus)||0,mg:10};if(s.snus.mg==null)s.snus.mg=10;return s;}
// reiner Alkohol in g (mit Alt-Format-Fallback)
function stimAlcoholG(d){const s=day(d).stim||{};let g=0;const dr=s.drinks||{};for(const k in dr)g+=(DRINKS_MAP[k]?DRINKS_MAP[k].g:0)*num(dr[k]);if(!Object.keys(dr).length&&num(s.alcohol))g+=num(s.alcohol)*14;return Math.round(g*10)/10;}
function stimStdDrinks(d){return Math.round(stimAlcoholG(d)/10*10)/10;} // 1 Standardglas ≈ 10 g
// Nikotin in mg (Vape ml×mg/ml + Zigaretten×1 + Snus Anzahl×mg)
function stimNicMg(d){const s=day(d).stim||{};let mg=0;if(s.vape&&typeof s.vape==='object')mg+=num(s.vape.ml)*num(s.vape.mgml||20);mg+=num(s.cigs)*1.0;if(s.snus&&typeof s.snus==='object')mg+=num(s.snus.count)*num(s.snus.mg||10);else mg+=num(s.snus)*10;if(!s.vape&&!s.cigs&&num(s.nicotine))mg+=num(s.nicotine)*3;return Math.round(mg*10)/10;}
function stimPenalty(d){const g=stimAlcoholG(d),nic=stimNicMg(d),caf=num((day(d).stim||{}).caffeine);return Math.round(g*0.7+nic*1.5+(caf>4?(caf-4)*4:0));}
function tonnageWindow(startAgo){let ton=0;const now=new Date(curDate);for(let i=startAgo;i<startAgo+7;i++){const d=new Date(now);d.setDate(now.getDate()-i);const dd=S.days[todayStr(d)];if(dd)dd.training.forEach(ex=>{ton+=exVol(ex)});}return ton;}

/* ---- STIMULANZIEN (detailliertes Tracking, senken Recovery) ---- */
function miniStepper(onMinus,onPlus,val,w){return `<div class="stepper flex0" style="width:${w||128}px"><button onclick="${onMinus}">−</button><input value="${val}" readonly><button onclick="${onPlus}">+</button></div>`}
function vStim(){
  const dd=day(),st=normStim(dd),pen=stimPenalty(curDate);
  const g=stimAlcoholG(curDate),std=stimStdDrinks(curDate),nic=stimNicMg(curDate);
  let html=vh("Recovery-Killer","Stimulanzien")+`<div class="panel coach-panel"><div class="between"><span class="lab">Recovery-Abzug heute</span><b class="serif-it" style="font-size:26px;color:${pen>0?'var(--red)':'var(--green)'}">−${pen}</b></div>
    <div class="row" style="gap:8px;margin-top:11px"><span class="tag">${g} g Alkohol · ${std} Std.-Gläser</span><span class="tag">${nic} mg Nikotin</span></div></div>`;
  // Alkohol — konkrete Getränke
  html+=sh("01","Alkohol")+`<div class="panel"><div class="xs mut" style="margin-bottom:6px">Tippe + für jedes Getränk. Reiner Alkohol wird automatisch berechnet.</div>`;
  DRINKS.forEach(d=>{const c=num(st.drinks[d.k]);
    html+=`<div class="between" style="padding:9px 0;border-bottom:1px solid var(--line)"><div style="flex:1;min-width:0"><b style="font-size:14px">${d.n}</b><div class="xs mut">${d.abv} % · ${d.g} g${c?` · gesamt ${Math.round(d.g*c*10)/10} g`:''}</div></div>${miniStepper(`stpDrink('${d.k}',-1)`,`stpDrink('${d.k}',1)`,c,120)}</div>`;});
  html+=`</div>`;
  // Koffein
  html+=sh("02","Koffein")+`<div class="panel"><div class="between"><span class="lab">Tassen</span>${stepper("st_caffeine",st.caffeine)}</div><div class="xs mut" style="margin-top:8px">Bis ~4 Tassen ohne Recovery-Abzug.</div></div>`;
  // Nikotin — Vape / Zigaretten / Snus
  html+=sh("03","Nikotin")+`<div class="panel">
    <div class="lab" style="margin-bottom:10px">Vape</div>
    <div class="row" style="gap:8px;align-items:flex-end"><div style="flex:1"><label>Stärke (mg/ml)</label><input id="vape_mgml" type="number" inputmode="decimal" value="${st.vape.mgml}" onchange="setVape('mgml',this.value)"></div>
      <div style="flex:1"><div class="lab" style="margin-bottom:6px">Liquid (ml)</div>${miniStepper("setVape('ml',-0.5)","setVape('ml',0.5)",st.vape.ml,118)}</div></div>
    <div class="between" style="margin-top:11px"><span class="lab">Züge gezogen</span>${miniStepper("setVape('puffs',-10)","setVape('puffs',10)",st.vape.puffs,128)}</div>
    <div class="xs mut" style="margin-top:6px">= ${Math.round(num(st.vape.ml)*num(st.vape.mgml)*10)/10} mg Nikotin</div>
    <hr>
    <div class="between"><span class="lab">Zigaretten</span>${miniStepper("stpCigs(-1)","stpCigs(1)",st.cigs,128)}</div>
    <hr>
    <div class="lab" style="margin-bottom:8px">Snus</div>
    <div class="row" style="gap:7px;flex-wrap:wrap;margin-bottom:11px">${[6,10,16,22].map(mg=>`<button class="chip flex0 ${num(st.snus.mg)===mg?'on':''}" onclick="setSnus('mg',${mg})">${mg} mg</button>`).join("")}</div>
    <div class="between"><span class="lab">Beutel <span class="xs mut">à ${st.snus.mg} mg</span></span>${miniStepper("setSnus('count',-1)","setSnus('count',1)",st.snus.count,128)}</div>
  </div>`;
  return html;
}
window.stpDrink=(k,d)=>{const s=normStim(day());s.drinks[k]=Math.max(0,num(s.drinks[k])+d);if(!s.drinks[k])delete s.drinks[k];save();render()};
window.setVape=(k,d)=>{const s=normStim(day());if(k==='mgml')s.vape.mgml=Math.max(0,num(d));else s.vape[k]=Math.max(0,Math.round((num(s.vape[k])+d)*10)/10);save();render()};

function cardioWeekAt(d){let m=0;const now=new Date(d||curDate);for(let i=0;i<7;i++){const x=new Date(now);x.setDate(now.getDate()-i);const dd=S.days[todayStr(x)];if(dd)m+=num(dd.cardioMin);}return m}
function cardioWeek(){return cardioWeekAt(curDate)}
// Gewichte nach Evidenzstärke × Effektgröße: stark (Schlaf/Licht/Cardio) > solide > moderat > schwach
const HP_WEIGHTS={sleepreg:10,light:9,nobed:6,heat:6,caffeine:5,hydrate:5,breath:5,sunset:4,nsdr:4,cold:4,theanine:3};
const HP_CARDIO_W=9, HP_CARDIO_TARGET=175;
function hubermanScore(d){
  const dd=day(d),prot=dd.protocol||{};let num_=0,den=0;
  for(const k in HP_WEIGHTS){den+=HP_WEIGHTS[k];if(prot[k])num_+=HP_WEIGHTS[k];}
  den+=HP_CARDIO_W;num_+=HP_CARDIO_W*clamp(cardioWeekAt(d)/HP_CARDIO_TARGET,0,1);
  return den?Math.round(num_/den*100):0;
}
function hpBody(){
  const dd=day();dd.protocol=dd.protocol||{};
  const wk=cardioWeek(),cTarget=HP_CARDIO_TARGET;
  let html=sh("01","Zone-2 Cardio")+`<div class="panel"><div class="between"><span class="lab">Heute (min)</span><div class="stepper flex0" style="width:170px"><button onclick="stpCardio(-5)">−</button><input value="${dd.cardioMin||0}" readonly><button onclick="stpCardio(5)">+</button></div></div>
    <div class="between" style="margin-top:14px"><span class="lab">Diese Woche</span><b class="serif-it" style="font-size:22px;color:${wk>=cTarget?'var(--green)':'var(--amber)'}">${wk} / ${cTarget} min</b></div>${bar(Math.min(100,wk/cTarget*100),wk>=cTarget?'var(--green)':'var(--amber)')}
    <div class="xs mut" style="margin-top:8px">Ziel: 150–200 min/Woche locker (Nasenatmung möglich).</div></div>`;
  const done=HP_ITEMS.filter(i=>dd.protocol[i.id]).length;
  html+=sh("02","Heute abhaken · "+done+"/"+HP_ITEMS.length);
  const evCol={stark:'var(--green)',solide:'var(--blue)',moderat:'var(--amber)',schwach:'var(--mut)'};
  HP_ITEMS.forEach(it=>{const on=!!dd.protocol[it.id];
    html+=`<div class="list-item ${on?'taken':''}"><div class="between"><div class="takerow" onclick="toggleHP('${it.id}')"><span class="check ${on?'on':''}">${on?'✓':''}</span><div><b class="serif-it" style="font-size:18px">${it.n}</b> <span class="tag" style="color:${evCol[it.ev]||'var(--mut)'};border:1px solid currentColor;background:transparent">${it.ev}</span>${on?' <span class="pill" style="margin-left:4px">erledigt</span>':''}</div></div><span class="lab flex0" title="Gewicht im Huberman-Score">×${HP_WEIGHTS[it.id]||0}</span></div>
    <div class="xs mut" style="margin-top:8px"><b style="color:var(--mut2)">${it.why}.</b> ${it.detail}</div></div>`;
  });
  return html;
}

function trainingStrain(d){const dd=day(d);let sets=0;dd.training.forEach(e=>sets+=e.sets.filter(s=>num(s.r)>0).length);const vol=dd.training.reduce((a,e)=>a+exVol(e),0);return clamp(sets*0.35+vol/2600,0,9);}
function combinedStrain(d){const dd=day(d);const w=(dd.whoop&&dd.whoop.strain!=null)?dd.whoop.strain:0;const t=trainingStrain(d);return Math.round(Math.min(21,w+(w?t*0.5:t))*10)/10;}

const METHYL_TOK={MTHFR_C677T:["c677t","677"],MTHFR_A1298C:["a1298c","1298"],MTRR:["mtrr"],COMT:["comt"],VDR:["vdr"],CBS:["cbs"],MAO_A:["mao-a","mao a","maoa"]};
function importLabText(text){
  let bAdded=0,mAdded=0;
  // Blutwerte
  text.split(/[\n;]+/).forEach(line=>{const m=line.trim().match(/^([A-Za-zÄÖÜäöü0-9 .,\-\(\)\/]+?)[\s:]+([0-9]+[.,]?[0-9]*)\s*([A-Za-zµ%\/]+)?/);if(m){const ref=matchRef(m[1]);if(ref){S.bloods.push({name:ref.n,val:m[2].replace(",","."),unit:m[3]||ref.u,date:curDate});bAdded++}}});
  // Methylierung: SNP-Token + Genotyp/Keyword im Umfeld
  const low=text.toLowerCase();
  for(const k in METHYL_TOK){for(const tok of METHYL_TOK[k]){const idx=low.indexOf(tok);if(idx>=0){const win=low.slice(idx,idx+60);let st="";
    if(/homozyg|\+\/\+|hom\b/.test(win))st="hom";else if(/heterozyg|\+\/\-|\-\/\+|het\b/.test(win))st="het";else if(/wildtyp|normal|\-\/\-|negativ/.test(win))st="norm";
    if(st){S.methylation=S.methylation||{};S.methylation[k]=st;mAdded++;}break;}}}
  save();render();flash(`${bAdded} Marker · ${mAdded} Genvarianten übernommen`);
}
window.uploadLab=async inp=>{const file=inp.files&&inp.files[0];if(!file)return;

      if(typeof pdfjsLib==="undefined"){flash("PDF-Engine nicht geladen (online nötig)");return}
      const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let text="";
      for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();text+=c.items.map(it=>it.str).join(" ")+"\n";}
      importLabText(text);
    } else { const text=await file.text(); importLabText(text); }
  }catch(err){flash("Konnte Datei nicht lesen");}
  inp.value="";
};

function bigChart(dates,vals,label,col,onclick){

// Auto-skalierter Roh-Trend mit Y-Min/Max & Start/End-Datum
function miniTrend(dates,vals,col,label,unit,inv){
  const pr=vals.filter(v=>v!=null);
  if(!pr.length)return `<div class="between" style="margin-top:15px"><span class="lab">${label}</span><span class="xs mut">keine Daten</span></div>`;
  const lo=Math.min(...pr),hi=Math.max(...pr),rng=(hi-lo)||1,w=700,H=72,pl=34,pb=15,pt=6;
  const pw=w-pl-8,ph=H-pt-pb;
  const x=i=>pl+i*(pw/Math.max(1,dates.length-1)), y=v=>pt+ph-((v-lo)/rng)*ph;
  let segs=[],cur=[];vals.forEach((v,i)=>{if(v==null){if(cur.length){segs.push(cur);cur=[];}}else cur.push(`${x(i).toFixed(1)},${y(v).toFixed(1)}`);});if(cur.length)segs.push(cur);
  const last=pr[pr.length-1],first=pr[0],tr=Math.round((last-first)*10)/10,good=inv?tr<=0:tr>=0;
  const firstIdx=vals.findIndex(v=>v!=null),lastIdx=vals.length-1-[...vals].reverse().findIndex(v=>v!=null);
  return `<div class="between" style="margin-top:15px"><span class="lab">${label}</span><span class="sm mut">${Math.round(last*10)/10}${unit||''} <b class="serif-it" style="color:${good?'var(--green)':'var(--red)'};font-size:15px;margin-left:6px">${tr>=0?'▲':'▼'} ${Math.abs(tr)}</b></span></div>
   <svg viewBox="0 0 ${w} ${H}" style="width:100%;height:auto;margin-top:3px">
     <text x="${pl-5}" y="${(y(hi)+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--mut2)">${Math.round(hi*10)/10}</text>
     <text x="${pl-5}" y="${(y(lo)+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--mut2)">${Math.round(lo*10)/10}</text>

function escapeHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function coachBase(){const u=(whoopCfg().dataUrl||"").trim();if(!u)return"";return u.replace(/\/data\/?$/,"").replace(/\/$/,"")}

function recoReasoning(){
  const mi=microIntake(curDate);
  const gaps=MICROS.filter(m=>num(mi[m.k])>0&&num(mi[m.k])<m.dri*0.6).map(m=>m.n);
  const flagged=S.bloods.filter(b=>{const r=matchRef(b.name),st=r?refStatus(r,num(b.val)):null;return st&&st!=="ok"}).map(b=>b.name);
  const methyl=Object.keys(S.methylation||{}).filter(k=>S.methylation[k]&&S.methylation[k]!=="norm").map(k=>{const m=METHYL.find(x=>x.k===k);return (m?m.n:k)+" "+S.methylation[k]});
  const parts=[];
  if(gaps.length)parts.push(`Deine <b>Ernährung</b> liegt über die letzten Tage zu niedrig bei: <b>${gaps.join(", ")}</b>.`);
  if(flagged.length)parts.push(`Deine <b>Blutwerte</b> sind auffällig bei: <b>${flagged.join(", ")}</b>.`);
  if(methyl.length)parts.push(`Dein <b>Methylierungstest</b>: <b>${methyl.join(", ")}</b> → bevorzuge methylierte Formen (z.B. Methylfolat, Methyl-B12).`);
  if(!parts.length)return `<div class="panel mut sm">Lade Blutwerte & Methylierung (Labor-Seite) hoch und logge Essen — dann zeige ich hier die komplette Beleg-Kette für jede Empfehlung.</div>`;
  return `<div class="panel coach-panel"><span class="tag">Belege aus deinen Daten</span><div class="sm" style="margin-top:10px;line-height:1.6">${parts.join(" ")} Daraus ergeben sich die folgenden priorisierten Ergänzungen — mit Dosis & Timing.</div></div>`;
}
window.askCoach=t=>{const inp=$("#coach_in");if(inp)inp.value=t;sendCoach();};
window.clearCoach=()=>{S.coachChat=[];save();render()};
window.sendCoach=async()=>{
  const inp=$("#coach_in");const q=inp?(inp.value||"").trim():"";if(!q)return;
  S.coachChat=S.coachChat||[];S.coachChat.push({role:"user",content:q});S.coachChat.push({role:"assistant",content:"…"});save();render();
  const base=coachBase();
  const setLast=t=>{S.coachChat[S.coachChat.length-1].content=t;save();render()};
  if(!base){setLast("Noch kein Backend verbunden. Trag die WHOOP-Daten-URL in Health Metrics → WHOOP ein — der Coach läuft über denselben Worker.");return;}
  try{
    const c=whoopCfg();
    const r=await fetch(base+"/coach",{method:"POST",headers:Object.assign({"Content-Type":"application/json"},c.token?{"Authorization":"Bearer "+c.token}:{}),body:JSON.stringify({messages:S.coachChat.filter(m=>m.content!=="…"),snapshot:coachSnapshot()})});
    const d=await r.json().catch(()=>({error:"Antwort unlesbar"}));
    if(d.reply)setLast(d.reply);
    else if(d.error==="coach_not_configured")setLast("Im Worker fehlt der ANTHROPIC_API_KEY. Setz ihn als Secret, dann antworte ich.");
    else setLast("Fehler: "+(d.error||"keine Antwort")+(d.detail?" — "+String(d.detail).slice(0,160):""));
  }catch(e){setLast("Coach nicht erreichbar (Worker/CORS prüfen).");}
};

/* ============ WHOOP INTEGRATION ============ */
const WHOOP_AUTH="https://api.prod.whoop.com/oauth/oauth2/auth";
const WHOOP_SCOPES="read:recovery read:sleep read:workout read:cycles read:profile offline";
const DEFAULT_BACKEND="https://maxcoach.7zfp8cmwhg.workers.dev"; // fest hinterlegt → immer verbunden
const DEFAULT_CLIENT_ID="470157a7-82b1-43bc-87eb-c3bc7d9b4b15";
const DEFAULT_REDIRECT="https://7zfp8cmwhg-art.github.io/whoop-app/redirect.html";
function whoopCfg(){S.whoopCfg=S.whoopCfg||{clientId:"",redirectUri:"",dataUrl:"",token:""};
  if(!S.whoopCfg.dataUrl)S.whoopCfg.dataUrl=DEFAULT_BACKEND+"/data";
  if(!S.whoopCfg.clientId)S.whoopCfg.clientId=DEFAULT_CLIENT_ID;
  if(!S.whoopCfg.redirectUri)S.whoopCfg.redirectUri=DEFAULT_REDIRECT;
  return S.whoopCfg}
function defRedirect(){return location.origin+location.pathname.replace(/[^/]*$/,'')+"redirect.html"}
function whoopAuthURL(){const c=whoopCfg();const st=Math.random().toString(36).slice(2,12);try{localStorage.setItem("whoop_state",st)}catch(e){}
  const ri=c.redirectUri||defRedirect();
  return WHOOP_AUTH+"?response_type=code&client_id="+encodeURIComponent(c.clientId)+"&redirect_uri="+encodeURIComponent(ri)+"&scope="+encodeURIComponent(WHOOP_SCOPES)+"&state="+st;}
window.connectWhoop=()=>{const c=whoopCfg();if(!c.clientId){flash("Client ID fehlt");return}location.href=whoopAuthURL();};
window.saveWhoopCfg=()=>{const c=whoopCfg();c.clientId=($("#wh_cid").value||"").trim();c.redirectUri=($("#wh_ri").value||"").trim();c.dataUrl=($("#wh_url").value||"").trim();c.token=($("#wh_tok")&&$("#wh_tok").value||"").trim();save();flash("WHOOP-Konfig gespeichert");render();};
window.syncWhoop=async()=>{const c=whoopCfg();if(!c.dataUrl){flash("Daten-URL fehlt");return}flash("Synchronisiere…");try{const r=await fetch(c.dataUrl,{headers:c.token?{"Authorization":"Bearer "+c.token}:{}});const d=await r.json();const n=applyWhoop(d);save();flash(n+" WHOOP-Einträge übernommen");render();}catch(e){flash("Sync fehlgeschlagen (Server/CORS prüfen)");}};
window.importWhoop=()=>{try{const d=JSON.parse($("#wh_json").value);const n=applyWhoop(d);if(!n){flash("Keine bekannten Felder gefunden");return}save();flash(n+" Einträge übernommen");render();}catch(e){flash("Ungültiges JSON");}};
function whoopDate(o){return String(o.start||o.created_at||o.updated_at||o.date||todayStr()).slice(0,10)}
function applyWhoop(d){if(!d)return 0;let n=0;const arr=x=>Array.isArray(x)?x:(x?[x]:[]);
  arr(d.recovery||d.recoveries||(d.type==="recovery"?d.records:null)).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};
    if(s.recovery_score!=null)dd.whoop.recoveryScore=Math.round(s.recovery_score);
    if(s.hrv_rmssd_milli!=null)dd.whoop.hrvMs=Math.round(s.hrv_rmssd_milli*10)/10;
    if(s.resting_heart_rate!=null)dd.whoop.rhr=Math.round(s.resting_heart_rate);
    if(s.spo2_percentage!=null)dd.whoop.spo2=Math.round(s.spo2_percentage*10)/10;
    if(s.skin_temp_celsius!=null)dd.whoop.skinTemp=Math.round(s.skin_temp_celsius*10)/10;
    if(dd.whoop.recoveryScore!=null)dd.recovery.hrv=clamp(Math.round(dd.whoop.recoveryScore/10),0,10);n++;});
  arr(d.sleep||d.sleeps).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};
    const ss=s.stage_summary||{};
    let ms=null;if(ss.total_in_bed_time_milli!=null)ms=ss.total_in_bed_time_milli-(ss.total_awake_time_milli||0);
    else if(s.total_sleep_milli!=null)ms=s.total_sleep_milli;else if(o.total_sleep_milli!=null)ms=o.total_sleep_milli;
    if(ms!=null){dd.whoop.sleepHours=Math.round(ms/3600000*10)/10;dd.sleep.hours=dd.whoop.sleepHours;}
    const perf=s.sleep_performance_percentage!=null?s.sleep_performance_percentage:o.sleep_performance_percentage;
    if(perf!=null){dd.whoop.sleepPerf=Math.round(perf);dd.sleep.quality=clamp(Math.round(perf/10),0,10);}
    if(s.sleep_efficiency_percentage!=null)dd.whoop.sleepEff=Math.round(s.sleep_efficiency_percentage);
    if(s.sleep_consistency_percentage!=null)dd.whoop.sleepCons=Math.round(s.sleep_consistency_percentage);
    if(s.respiratory_rate!=null)dd.whoop.respRate=Math.round(s.respiratory_rate*10)/10;
    const mh=v=>v!=null?Math.round(v/3600000*10)/10:null;
    if(ss.total_light_sleep_time_milli!=null)dd.whoop.slLight=mh(ss.total_light_sleep_time_milli);
    if(ss.total_slow_wave_sleep_time_milli!=null)dd.whoop.slDeep=mh(ss.total_slow_wave_sleep_time_milli);
    if(ss.total_rem_sleep_time_milli!=null)dd.whoop.slRem=mh(ss.total_rem_sleep_time_milli);
    if(ss.total_awake_time_milli!=null)dd.whoop.slAwake=mh(ss.total_awake_time_milli);
    if(ss.disturbance_count!=null)dd.whoop.slDist=ss.disturbance_count;
    if(s.sleep_needed&&s.sleep_needed.baseline_milli!=null){const need=s.sleep_needed.baseline_milli+(s.sleep_needed.need_from_sleep_debt_milli||0)+(s.sleep_needed.need_from_recent_strain_milli||0)+(s.sleep_needed.need_from_recent_nap_milli||0);dd.whoop.sleepNeed=mh(need);}
    if(o.end)dd.whoop.wakeHour=localHour(o.end,o.tz);
    if(o.start)dd.whoop.bedHour=localHour(o.start,o.tz);
    n++;});
  arr(d.workout||d.workouts).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};if(s.strain!=null)dd.whoop.strain=Math.round(s.strain*10)/10;n++;});
  arr(d.cycle||d.cycles).forEach(o=>{const s=o.score||o;const dd=day(whoopDate(o));dd.whoop=dd.whoop||{};if(s.strain!=null)dd.whoop.dayStrain=Math.round(s.strain*10)/10;if(s.kilojoule!=null)dd.whoop.kcalBurn=Math.round(s.kilojoule/4.184);n++;});
  return n;}

  lbl.textContent=d.toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})+(isToday?" · heute":"");
}
function flash(msg){const f=e("div",{style:"position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:99;background:linear-gradient(180deg,#3E7C59,#35684C);color:#ffffff;font-weight:700;padding:11px 20px;border-radius:999px;box-shadow:0 10px 30px -10px rgba(62,124,89,.6)"},msg);document.body.appendChild(f);setTimeout(()=>f.remove(),1200)}

function applyTheme(){if(document.body)document.body.classList.toggle('dark',S.theme==='dark');}
window.toggleTheme=()=>{S.theme=(S.theme==='dark')?'light':'dark';save();applyTheme();render();};
function init(){
  applyTheme();
  if(S.profile&&S.profile.goal==='maintain')S.profile.goal='recomp'; // Migration alte Ziel-Bezeichnung
  stampAllDays();
  const p=$("#datePrev"),n=$("#dateNext"),t=$("#dateToday");
  if(p)p.onclick=()=>{const d=new Date(curDate);d.setDate(d.getDate()-1);curDate=todayStr(d);render()};
  if(n)n.onclick=()=>{const d=new Date(curDate);d.setDate(d.getDate()+1);curDate=todayStr(d);render()};
  if(t)t.onclick=()=>{curDate=todayStr();render()};
  render();
}

/* ===== standalone bootstrap (replaces DCLogic wrapper) ===== */
document.documentElement.style.setProperty('--green', CFG.accent);
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();

</script>
</body>
